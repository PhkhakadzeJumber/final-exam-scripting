name: CI/CD Pipeline

stages:
  - build
  - test
  - deploy

# Variables are defined once at the top and reused everywhere in the pipeline.
# The alternative is hardcoding values like "22" or "3" scattered across every
# job — then if you want to upgrade Node you're hunting through the whole file
# changing the same value in five places and missing one. Here you change it
# in one spot and every job picks it up automatically.
# NODE_VERSION documents which Node the project depends on.
# CACHE_KEY scopes the node_modules cache per branch using GitLab's built-in
# variable $CI_COMMIT_REF_SLUG (which is just the branch name, URL-safe) —
# this stops feature branches from overwriting each other's cached dependencies.
# VERCEL_TOKEN is not written here — it lives in GitLab → Settings → CI/CD →
# Variables as a secret, so it never appears in the codebase. The pipeline
# reads it automatically from there at runtime.
variables:
  NODE_VERSION: "22"
  CACHE_KEY: "$CI_COMMIT_REF_SLUG"

# ─── BUILD ───────────────────────────────────────────────
# Every time code is pushed, we need a clean compiled version of the app.
# We use a Node 22 container so the build behaves identically on every machine.
# node_modules gets cached by branch so we're not downloading hundreds of
# packages from npm on every single run. npm ci reads the lockfile strictly —
# it will never silently change a dependency version, which is exactly what
# you want in a pipeline. The compiled output (dist/) is saved as an artifact
# so the deploy stage can grab it without rebuilding from scratch.
build_job:
  stage: build
  image: node:${NODE_VERSION}-alpine
  cache:
    key: "$CACHE_KEY"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
      - build/
    expire_in: 1 hour
  only:
    - branches
    - merge_requests

# ─── TEST ────────────────────────────────────────────────
# This runs after build completes. We pull the same cached node_modules
# (policy: pull means read-only — no need to update the cache here) and
# run two checks: lint catches code style and syntax problems before they
# reach production, and the test suite validates actual functionality.
# The || true on lint means a lint warning won't kill the whole pipeline —
# useful while the project is still maturing. Coverage is collected and
# saved so GitLab can display it on every merge request, letting you see
# at a glance whether new code is being tested or not.
test_job:
  stage: test
  image: node:${NODE_VERSION}-alpine          
  cache:
    key: "$CACHE_KEY"         
    paths:
      - node_modules/
    policy: pull
  script:
    - npm run lint || true
    - npm test -- --coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'           
  artifacts:
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 7 days
  dependencies:
    - build_job
  only:
    - branches
    - merge_requests

# ─── DEPLOY: STAGING ─────────────────────────────────────
# Every push to develop deploys a preview to Vercel automatically.
# Vercel gives each deploy its own unique URL (like yoursite-abc123.vercel.app)
# so you can share it with your team to QA the real thing before it touches
# production. We install the Vercel CLI inside the job, then run vercel deploy
# without --prod so it stays in preview mode. The VERCEL_TOKEN, VERCEL_ORG_ID
# and VERCEL_PROJECT_ID are secret variables stored in GitLab settings —
# they authenticate the CLI without ever being written in this file.
deploy_staging:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  environment:
    name: staging
    url: https://yoursite-preview.vercel.app
  script:
    - npm install -g vercel
    - vercel deploy --token=$VERCEL_TOKEN yes
  dependencies:
    - build_job
  only:
    - develop

# ─── DEPLOY: PRODUCTION ──────────────────────────────────
# Production deploys only from main and only after a human clicks Approve
# in GitLab — no code ever reaches real users by accident. The --prod flag
# tells Vercel this is the live production deployment, not a preview, so it
# gets assigned your actual domain (yoursite.com) instead of a preview URL.
# Vercel handles zero-downtime on their end — they swap the new build in
# atomically so visitors never hit a broken or missing page mid-deploy.
# allow_failure: false means if the Vercel deploy fails for any reason,
# the pipeline stops and marks itself failed rather than silently succeeding.
deploy_production:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  environment:
    name: production
    url: https://yoursite.com
  script:
    - npm install -g vercel
    - vercel deploy --prod --token=$VERCEL_TOKEN yes
  dependencies:
    - build_job
  when: manual
  allow_failure: false
  only:
    - main